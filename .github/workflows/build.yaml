name: Build static dlv

on:
  workflow_dispatch:          # 手动触发
  push:
    tags:
      - 'dlv-*'              # 推送 dlv-v1.23.0 之类 tag 时自动构建

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout delve source
        uses: actions/checkout@v4
        with:
          repository: go-delve/delve
          # 不指定 ref，自动使用仓库默认分支（master）
          # 或者要使用特定版本，写成 ref: v1.23.0
          path: delve

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'

      - name: Build static dlv
        working-directory: delve
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -o dlv-static-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/dlv

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dlv-${{ matrix.goos }}-${{ matrix.goarch }}
          path: delve/dlv-static-*